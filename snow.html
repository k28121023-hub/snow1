<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極速滑雪冒險 - 手機優化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f0f9ff;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            outline: none;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #damage-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(239, 68, 68, 0.2);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
            z-index: 10;
        }
        .hp-heart {
            color: #ef4444;
            display: inline-block;
            margin-right: 1px;
            filter: drop-shadow(0 1px 2px rgba(239, 68, 68, 0.3));
            font-size: 1rem;
            line-height: 1;
        }
        .btn {
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn:active { transform: scale(0.9); }
        
        .shop-item {
            background: #ffffff;
            border: 2px solid #f1f5f9;
            border-radius: 15px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* 遊戲按鈕 */
        .control-btn {
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .control-btn:active {
            background: rgba(255, 255, 255, 0.8);
            transform: scale(0.9);
        }

        #avalanche-alert {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(220, 38, 38, 0.95);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 9999px;
            font-weight: 900;
            font-size: 0.8rem;
            border: 2px solid white;
            opacity: 0;
            z-index: 100;
        }
        #avalanche-alert.active { opacity: 1; animation: alertPulse 0.6s infinite alternate; }
        @keyframes alertPulse { from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.05); } }
    </style>
</head>
<body>

    <canvas id="gameCanvas" tabindex="1"></canvas>

    <div id="ui-layer">
        <div id="damage-flash"></div>
        <div id="avalanche-alert">⚠️ 雪崩警報：請加速！ ⚠️</div>
        
        <!-- HUD -->
        <div id="hud" class="absolute top-2 left-2 flex flex-col gap-1 pointer-events-none scale-90 origin-top-left">
            <div class="bg-white/80 backdrop-blur px-3 py-1.5 rounded-xl border-2 border-white shadow-lg flex items-center gap-2">
                <div id="hpContainer" class="flex items-center"></div>
            </div>
            <div class="flex gap-1.5">
                <div class="bg-white/80 backdrop-blur px-3 py-1.5 rounded-xl border-2 border-white shadow-lg flex items-center gap-2">
                    <span class="text-amber-500 font-black text-sm tabular-nums" id="coinDisplay">0</span>
                    <span class="text-[8px] font-bold text-slate-400">💰</span>
                </div>
                <div id="gunAmmoDisplay" class="bg-white/80 backdrop-blur px-3 py-1.5 rounded-xl border-2 border-white shadow-lg hidden items-center gap-2">
                    <span class="text-blue-500 font-black text-sm tabular-nums" id="gunAmmoCount">0</span>
                    <span class="text-[8px] font-bold text-slate-400">🚀</span>
                </div>
                <div id="thawAmmoDisplay" class="bg-white/80 backdrop-blur px-3 py-1.5 rounded-xl border-2 border-white shadow-lg hidden items-center gap-2">
                    <span class="text-indigo-500 font-black text-sm tabular-nums" id="thawAmmoCount">0</span>
                    <span class="text-[8px] font-bold text-slate-400">❄️</span>
                </div>
            </div>
        </div>

        <!-- 進度 -->
        <div id="quizContainer" class="absolute top-2 right-2 bg-blue-600/90 px-4 py-2 rounded-2xl border-2 border-white shadow-xl pointer-events-none hidden scale-90 origin-top-right">
            <div id="quizZh" class="text-white font-black text-lg">載入中...</div>
            <div class="mt-1 h-1.5 bg-blue-800 rounded-full overflow-hidden w-24">
                <div id="quizProgress" class="h-full bg-yellow-400 transition-all" style="width: 0%"></div>
            </div>
        </div>

        <!-- 手機發射按鈕 (右下角) -->
        <div id="mobileControls" class="absolute bottom-6 right-6 flex flex-col items-center gap-4">
            <button id="fireBtn" class="control-btn w-16 h-16 text-2xl shadow-2xl btn">
                🔥
            </button>
        </div>

        <!-- 手機提示訊息 (連點兩次) -->
        <div id="tapTip" class="absolute bottom-1/4 left-1/2 -translate-x-1/2 text-white/60 font-bold text-xs pointer-events-none opacity-0 transition-opacity">
            靠近商店連點兩次進入
        </div>

        <!-- 商店、勝利、失敗、開始畫面 (略作結構優化) -->
        <div id="shopScreen" class="absolute inset-0 flex items-center justify-center bg-black/40 hidden pointer-events-auto">
            <div class="bg-white p-6 rounded-[30px] shadow-2xl w-full max-w-[320px] border-4 border-slate-50">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-black text-slate-800">滑雪商店</h2>
                    <div class="bg-amber-50 px-3 py-1 rounded-full text-amber-600 font-black text-xs border border-amber-100">
                        💰 <span id="shopCoinDisplay">0</span>
                    </div>
                </div>
                <div class="space-y-2 mb-4 max-h-[50vh] overflow-y-auto">
                    <!-- 商品項目 -->
                    <div class="shop-item">
                        <div class="text-xs font-bold text-slate-600">恢復生命 (+1)</div>
                        <button onclick="buyItem('hp')" class="btn bg-blue-600 text-white px-4 py-1.5 rounded-lg font-black text-[10px]">15 💰</button>
                    </div>
                    <div class="shop-item">
                        <div class="text-xs font-bold text-slate-600">無敵護盾</div>
                        <button onclick="buyItem('full')" class="btn bg-yellow-500 text-white px-4 py-1.5 rounded-lg font-black text-[10px]">50 💰</button>
                    </div>
                    <div class="shop-item">
                        <div class="text-xs font-bold text-slate-600">光波砲 (50發)</div>
                        <button onclick="buyItem('gun')" class="btn bg-slate-800 text-white px-4 py-1.5 rounded-lg font-black text-[10px]">30 💰</button>
                    </div>
                    <div class="shop-item">
                        <div class="text-xs font-bold text-slate-600">解凍槍 (50發)</div>
                        <button onclick="buyItem('thaw')" class="btn bg-indigo-600 text-white px-4 py-1.5 rounded-lg font-black text-[10px]">30 💰</button>
                    </div>
                </div>
                <button onclick="exitShop()" class="btn w-full bg-slate-100 text-slate-500 font-black py-3 rounded-xl text-xs uppercase tracking-widest border border-slate-200">繼續滑行</button>
            </div>
        </div>

        <div id="victoryScreen" class="absolute inset-0 flex items-center justify-center bg-blue-600/40 backdrop-blur-sm hidden pointer-events-auto">
            <div class="bg-white p-10 rounded-[40px] shadow-2xl text-center max-w-[320px] border-4 border-yellow-400">
                <div class="text-5xl mb-4">🏆</div>
                <h2 class="text-3xl font-black text-blue-600 mb-4 italic uppercase">Clear!</h2>
                <button onclick="resetGame()" class="btn w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg text-lg uppercase">再玩一次</button>
            </div>
        </div>

        <div id="gameOverScreen" class="absolute inset-0 flex items-center justify-center bg-slate-900/80 hidden pointer-events-auto">
            <div class="bg-white p-8 rounded-[30px] shadow-2xl text-center max-w-[280px]">
                <h2 class="text-2xl font-black text-slate-800 mb-6 italic uppercase">挑戰失敗</h2>
                <button onclick="resetGame()" class="btn w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-xl text-lg">重新開始</button>
            </div>
        </div>

        <div id="startScreen" class="absolute inset-0 flex items-center justify-center bg-white pointer-events-auto">
            <div class="text-center p-6 max-w-sm">
                <div class="mb-4 bg-blue-600 p-6 rounded-[35px] shadow-xl inline-block text-white">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 22h20L12 2z" /></svg>
                </div>
                <h1 class="text-4xl font-black text-slate-900 mb-4 italic text-blue-600 uppercase">Vital Ski</h1>
                <p class="text-slate-500 mb-8 text-sm font-medium">收集金幣並閃避障礙！<br><b>手機操作：</b>點擊螢幕左側移動，右下角發射。<br><b>商店：</b>靠近商店時連點螢幕兩次進入。</p>
                <button onclick="startGame()" class="btn bg-blue-600 hover:bg-blue-700 text-white font-black px-12 py-4 rounded-[25px] shadow-xl text-xl uppercase tracking-widest">開始冒險</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const hpContainer = document.getElementById('hpContainer');
        const coinDisplay = document.getElementById('coinDisplay');
        const shopCoinDisplay = document.getElementById('shopCoinDisplay');
        const gunAmmoCountDisplay = document.getElementById('gunAmmoCount');
        const thawAmmoCountDisplay = document.getElementById('thawAmmoCount');
        const gunAmmoDisplay = document.getElementById('gunAmmoDisplay');
        const thawAmmoDisplay = document.getElementById('thawAmmoDisplay');
        const damageFlash = document.getElementById('damage-flash');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const victoryScreen = document.getElementById('victoryScreen');
        const shopScreen = document.getElementById('shopScreen');
        const startScreen = document.getElementById('startScreen');
        const quizContainer = document.getElementById('quizContainer');
        const quizZhText = document.getElementById('quizZh');
        const quizProgress = document.getElementById('quizProgress');
        const avalancheAlertElement = document.getElementById('avalanche-alert');
        const fireBtn = document.getElementById('fireBtn');
        const tapTip = document.getElementById('tapTip');

        // 主角圖片
        const playerImg01 = new Image(); playerImg01.src = 'player01.png';
        const playerImg02 = new Image(); playerImg02.src = 'player02.png';

        // 控制系統 (支援鍵盤 + 觸控)
        const keys = {};
        const touchInputs = { active: false, x: 0, y: 0, firing: false };
        let lastTapTime = 0;

        window.addEventListener('keydown', e => { 
            keys[e.code] = true; 
            if(["ArrowUp", "ArrowDown", "KeyW", "KeyS", "Space", "ArrowRight", "KeyD", "KeyA", "ArrowLeft"].includes(e.code)) e.preventDefault(); 
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // 觸控事件處理
        canvas.addEventListener('touchstart', e => {
            touchInputs.active = true;
            const t = e.touches[0];
            touchInputs.x = t.clientX;
            touchInputs.y = t.clientY;
            
            // 雙擊檢測
            const now = Date.now();
            if (now - lastTapTime < 300) {
                checkShopEntry();
            }
            lastTapTime = now;
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const t = e.touches[0];
            touchInputs.x = t.clientX;
            touchInputs.y = t.clientY;
        }, { passive: false });

        canvas.addEventListener('touchend', () => { touchInputs.active = false; });

        // 發射按鈕事件 (手機)
        fireBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchInputs.firing = true;
        }, { passive: false });
        fireBtn.addEventListener('touchend', () => {
            touchInputs.firing = false;
        });

        const vocabDB = [
            { en: 'Mountain', zh: '山' }, { en: 'Forest', zh: '森林' }, { en: 'Glacier', zh: '冰河' }, 
            { en: 'Adventure', zh: '冒險' }, { en: 'Winter', zh: '冬天' }, { en: 'Danger', zh: '危險' }, 
            { en: 'Energy', zh: '能量' }, { en: 'Freedom', zh: '自由' }, { en: 'Frost', zh: '霜' }, 
            { en: 'Peak', zh: '頂峰' }, { en: 'Valley', zh: '峽谷' }, { en: 'Aurora', zh: '極光' }, 
            { en: 'Blizzard', zh: '暴風雪' }, { en: 'Survival', zh: '生存' }, { en: 'Crystal', zh: '水晶' }
        ];

        let gameState = 'START';
        let worldX = 0; 
        let currentLevel = 1;
        let wordsCollected = 0;
        let worldTime = 'DAY'; 
        let finishLine = { x: -1, active: false };
        let screenShake = 0;

        let avalanche = {
            active: false, screenX: -1200, speed: 15, timer: 0, activeTimer: 0, duration: 3000, hasDealtDamage: false 
        };

        const player = {
            screenX: 0, screenY: 0,
            width: 45, height: 45,
            vx: 0, vy: 0, 
            accelX: 0.8, accelY: 2.5, friction: 0.94, maxVX: 25,      
            hp: 5, maxHp: 5,
            coins: 0,
            hasGun: false, gunAmmo: 0,
            hasThaw: false, thawAmmo: 0,
            invincible: false, invincibleTimer: 0,
            isGodMode: false, firingThaw: false, lastFiredGun: 0 
        };

        let mountains = [], trees = [], clouds = [], worldCoins = [], worldShops = [], groundRocks = [], floatingWords = [];
        let projectiles = [], sprayParticles = [], skiTracks = [];

        function updateHUD() {
            let hearts = "";
            for (let i = 0; i < player.maxHp; i++) {
                const colorClass = player.isGodMode ? 'text-yellow-500' : (i < player.hp ? '' : 'grayscale opacity-20');
                hearts += `<span class="hp-heart ${colorClass}">${player.isGodMode ? '🌟' : '❤️'}</span>`;
            }
            hpContainer.innerHTML = hearts;
            coinDisplay.innerText = player.coins;

            if (player.hasGun) { gunAmmoDisplay.classList.remove('hidden'); gunAmmoCountDisplay.innerText = player.gunAmmo; }
            if (player.hasThaw) { thawAmmoDisplay.classList.remove('hidden'); thawAmmoCountDisplay.innerText = Math.ceil(player.thawAmmo); }
        }

        function setQuiz() {
            if (finishLine.active) { quizZhText.innerText = "🏁 衝向終點！"; quizProgress.style.width = "100%"; return; }
            const currentQuiz = vocabDB[Math.floor(Math.random() * vocabDB.length)];
            window.currentQuizEn = currentQuiz.en;
            quizZhText.innerText = currentQuiz.zh;
            const target = currentLevel === 1 ? 10 : 5;
            quizProgress.style.width = `${(wordsCollected / target) * 100}%`;
        }

        function isAreaClear(x, y, radius) {
            for (let t of trees) if (Math.hypot(x - t.x, y - t.y) < radius + 80) return false;
            for (let s of worldShops) if (Math.hypot(x - (s.x + 65), y - (s.y + 55)) < radius + 150) return false;
            for (let g of groundRocks) if (Math.hypot(x - g.x, y - g.y) < radius + 100) return false;
            return true;
        }

        function spawnTree(isInitial = false) {
            const rangeX = isInitial ? canvas.width * 2 : 1000;
            const x = worldX + (isInitial ? Math.random() * rangeX : canvas.width + Math.random() * rangeX);
            const y = 200 + Math.random() * (canvas.height - 350);
            if (isAreaClear(x, y, 30)) trees.push({ x, y, size: 35 + Math.random() * 25, color: ['#064e3b', '#065f46', '#14532d'][Math.floor(Math.random() * 3)] });
        }
        function spawnCoin() {
            const x = worldX + canvas.width + 200 + Math.random() * 1000;
            const y = 220 + Math.random() * (canvas.height - 350);
            if (isAreaClear(x, y, 20)) worldCoins.push({ x, y, size: 16 });
        }
        function spawnShop() {
            const x = worldX + canvas.width + 1500 + Math.random() * 1000;
            const y = 250 + Math.random() * (canvas.height - 450);
            if (isAreaClear(x + 65, y + 55, 120)) worldShops.push({ x, y, width: 130, height: 110 });
        }
        function spawnWord() {
            const x = worldX + canvas.width + 800 + Math.random() * 800;
            const y = 200 + Math.random() * (canvas.height - 350);
            if (isAreaClear(x, y, 50)) {
                let wd = Math.random() < 0.6 ? vocabDB.find(v => v.en === window.currentQuizEn) : vocabDB[Math.floor(Math.random() * vocabDB.length)];
                if(!wd) wd = vocabDB[0];
                const isFrozen = (currentLevel === 2 && Math.random() < 0.55);
                floatingWords.push({ x, y, en: wd.en, zh: wd.zh, pulse: 0, isFrozen: isFrozen });
            }
        }
        function createGroundRock() {
            const x = worldX + canvas.width + Math.random() * 1000, y = 180 + Math.random() * (canvas.height - 180);
            if (!isAreaClear(x, y, 80)) return null;
            const w = 60 + Math.random()*40, h = w * 0.45;
            const verts = [];
            for(let v=0; v<12; v++){
                const a = (v/12)*Math.PI*2;
                verts.push({x: Math.cos(a)*(w*0.5)*(0.9+Math.random()*0.2), y: Math.sin(a)*(h*0.5)*(0.9+Math.random()*0.2)});
            }
            return { x, y, rocks: [{ offX: 0, offY: 0, vertices: verts, width: w, height: h, colors: {mid:'#334155', light:'#64748b', dark:'#0f172a', line:'rgba(255,255,255,0.1)'}, dissolving: false, dissolveAlpha: 1.0 }] };
        }

        // 檢查雙擊進入商店
        function checkShopEntry() {
            for(let i=worldShops.length-1; i >= 0; i--) {
                let s = worldShops[i];
                let sx = s.x - worldX;
                if(Math.abs(player.screenX - (sx + 65)) < 150 && Math.abs(player.screenY - (s.y + 55)) < 120) {
                    worldShops.splice(i, 1);
                    enterShopUI();
                    return;
                }
            }
        }

        window.buyItem = function(type) {
            if (type === 'hp' && player.coins >= 15 && player.hp < player.maxHp) { player.hp++; player.coins -= 15; } 
            else if (type === 'full' && player.coins >= 50) { player.isGodMode = true; player.coins -= 50; }
            else if (type === 'gun' && player.coins >= 30) { player.hasGun = true; player.gunAmmo += 50; player.coins -= 30; }
            else if (type === 'thaw' && player.coins >= 30) { player.hasThaw = true; player.thawAmmo += 50; player.coins -= 30; }
            updateHUD(); shopCoinDisplay.innerText = player.coins;
        }
        window.exitShop = function() { gameState = 'PLAYING'; shopScreen.classList.add('hidden'); player.invincible = true; player.invincibleTimer = 90; }
        function enterShopUI() { gameState = 'SHOP'; shopScreen.classList.remove('hidden'); shopCoinDisplay.innerText = player.coins; }
        
        function fireCannon() {
            if (player.hasGun && player.gunAmmo > 0 && Date.now() - player.lastFiredGun > 250) {
                projectiles.push({ x: player.screenX + 30, y: player.screenY, vx: player.vx + 20, life: 100 });
                player.gunAmmo--; player.lastFiredGun = Date.now();
            }
        }
        function takeDamage() {
            if (player.isGodMode || player.invincible || gameState !== 'PLAYING') return;
            player.hp--; player.invincible = true; player.invincibleTimer = 100;
            updateHUD(); damageFlash.style.opacity = "1";
            setTimeout(() => { damageFlash.style.opacity = "0"; }, 150);
            if (player.hp <= 0) { gameState = 'GAMEOVER'; gameOverScreen.classList.remove('hidden'); quizContainer.classList.add('hidden'); }
        }

        function resetGameParams() {
            worldX = 0; currentLevel = 1; worldTime = 'DAY'; wordsCollected = 0;
            finishLine = { x: -1, active: false };
            avalanche = { active: false, screenX: -1200, speed: 15, timer: 0, activeTimer: 0, duration: 3000, hasDealtDamage: false };
            avalancheAlertElement.classList.remove('active');
            trees = []; mountains = []; clouds = []; worldCoins = []; worldShops = []; groundRocks = []; projectiles = []; floatingWords = []; sprayParticles = []; skiTracks = [];
            player.vx = 0; player.vy = 0; player.hp = 5; player.coins = 0; player.hasGun = false; player.gunAmmo = 0; player.hasThaw = false; player.thawAmmo = 0;
            player.isGodMode = false; player.invincible = false; player.screenY = canvas.height / 2;
            updateHUD(); setQuiz(); quizContainer.classList.remove('hidden');
            gameOverScreen.classList.add('hidden'); victoryScreen.classList.add('hidden');
            for(let i=0; i<12; i++) spawnTree(true);
            for(let i=0; i<15; i++) mountains.push({ x: Math.random() * canvas.width * 8, width: 1200 + Math.random() * 1500, height: 100 + Math.random() * 300, parallax: 0.1, color: '#64748b' });
            for(let i=0; i<15; i++) clouds.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height*0.3, size: 60+Math.random()*100, vx: -(0.3+Math.random()*0.5)});
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; player.screenX = canvas.width * 0.2; }
        window.addEventListener('resize', resize);
        resize();

        function update(dt) {
            if (gameState !== 'PLAYING') return;
            const step = Math.min(dt / 16.67, 2);
            if (player.invincibleTimer > 0) player.invincibleTimer--;

            // 移動輸入邏輯 (結合鍵盤與手機觸控)
            let ax = 0, ay = 0;
            if (keys['ArrowRight'] || keys['KeyD']) ax = player.accelX;
            if (keys['ArrowLeft'] || keys['KeyA']) ax = -player.accelX;
            if (keys['ArrowUp'] || keys['KeyW']) ay = -1;
            if (keys['ArrowDown'] || keys['KeyS']) ay = 1;

            if (touchInputs.active) {
                // 如果點擊螢幕左側
                const deltaX = touchInputs.x - player.screenX;
                const deltaY = touchInputs.y - player.screenY;
                if(Math.abs(deltaX) > 20) ax = deltaX > 0 ? player.accelX : -player.accelX;
                if(Math.abs(deltaY) > 20) ay = deltaY > 0 ? 1 : -1;
            }

            player.vx += ax; player.vx *= player.friction; 
            player.vy += (ay * player.accelY); player.vy *= player.friction;
            worldX += player.vx * step;
            player.screenY += player.vy * step;

            const tBound = 180 + player.height/2, bBound = canvas.height - player.height/2;
            if (player.screenY < tBound) player.screenY = tBound;
            if (player.screenY > bBound) player.screenY = bBound;

            if (finishLine.active && (worldX + player.screenX) > (finishLine.x + 235)) {
                gameState = 'VICTORY'; victoryScreen.classList.remove('hidden'); quizContainer.classList.add('hidden');
            }

            // 雪崩
            avalanche.timer += dt;
            if (!avalanche.active && avalanche.timer > 25000 && !finishLine.active) {
                avalanche.active = true; avalanche.activeTimer = 0; avalanche.screenX = -1200; avalanche.hasDealtDamage = false;
                avalancheAlertElement.classList.add('active'); setTimeout(() => avalancheAlertElement.classList.remove('active'), 2000);
            }
            if (avalanche.active) {
                avalanche.activeTimer += dt; avalanche.screenX += avalanche.speed * step;
                if (avalanche.screenX > player.screenX - 20 && !avalanche.hasDealtDamage) { takeDamage(); avalanche.hasDealtDamage = true; }
                if (avalanche.activeTimer > avalanche.duration) { avalanche.active = false; avalanche.timer = 0; }
            }

            // 發射
            if (keys['Space'] || touchInputs.firing) { 
                fireCannon(); 
                if (player.hasThaw && player.thawAmmo > 0) { player.firingThaw = true; player.thawAmmo -= 0.2 * step; } 
                else { player.firingThaw = false; }
            } else { player.firingThaw = false; }

            updateHUD();

            // 碰撞與採集邏輯 (簡化處理)
            for (let i = floatingWords.length - 1; i >= 0; i--) {
                let w = floatingWords[i], wx = w.x - worldX; w.pulse += 0.05 * step;
                if (player.firingThaw && w.isFrozen && wx > player.screenX && wx < player.screenX + 400 && Math.abs(w.y - player.screenY) < 60) w.isFrozen = false;
                if (Math.abs(player.screenX - wx) < 60 && Math.abs(player.screenY - w.y) < 40) {
                    if (w.isFrozen) continue;
                    if (w.en === window.currentQuizEn) {
                        wordsCollected++;
                        if (currentLevel === 1 && wordsCollected >= 10) { currentLevel=2; worldTime='NIGHT'; wordsCollected=0; setQuiz(); }
                        else if (currentLevel === 2 && wordsCollected >= 5) { finishLine.active=true; finishLine.x=worldX+3500; setQuiz(); }
                        else setQuiz();
                    } else takeDamage();
                    floatingWords.splice(i, 1);
                }
            }
            
            // 障礙物與金幣
            for (let i = groundRocks.length - 1; i >= 0; i--) {
                let g = groundRocks[i], gx = g.x - worldX;
                g.rocks.forEach(r => {
                    if (!player.isGodMode && !player.invincible && !r.dissolving && Math.abs(player.screenX - gx) < r.width*0.7 && Math.abs(player.screenY - g.y) < r.height*0.7) takeDamage();
                    if (player.firingThaw && gx > player.screenX && gx < player.screenX + 400 && Math.abs(g.y - player.screenY) < 70) r.dissolving = true;
                    if (r.dissolving) r.dissolveAlpha -= 0.05 * step;
                });
                if (g.rocks[0].dissolveAlpha <= 0 || gx < -500) groundRocks.splice(i, 1);
            }

            for(let i=worldCoins.length-1; i>=0; i--) {
                let cx = worldCoins[i].x - worldX;
                if(Math.abs(player.screenX - cx) < 60 && Math.abs(player.screenY - worldCoins[i].y) < 60) { player.coins++; worldCoins.splice(i, 1); } 
                else if(cx < -500) worldCoins.splice(i, 1);
            }

            // 商店提示
            let nearShop = false;
            for(let s of worldShops) { if(Math.abs(player.screenX - (s.x - worldX + 65)) < 150) nearShop = true; }
            tapTip.style.opacity = nearShop ? "1" : "0";

            // 砲彈運動
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i]; p.x += (p.vx - player.vx) * step; p.life -= 1 * step;
                if (p.life <= 0 || p.x > canvas.width) projectiles.splice(i, 1);
            }

            // 生成
            if (Math.abs(player.vx) > 1.0) {
                if (Math.random() < 0.015) spawnTree();
                if (Math.random() < 0.035) spawnCoin(); 
                if (worldX > 500 && Math.random() < 0.01) spawnShop();
                if (Math.random() < 0.006) { const r = createGroundRock(); if(r) groundRocks.push(r); }
                if (Math.random() < 0.018) spawnWord();
            }
            clouds.forEach(c => { c.x += (c.vx - (player.vx * 0.05)) * step; if(c.x < -150) c.x = canvas.width + 150; });
        }

        // 繪圖部分
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = worldTime === 'DAY' ? '#bae6fd' : '#020617'; ctx.fillRect(0, 0, canvas.width, 180);
            
            mountains.forEach(m => {
                let mX = (m.x - worldX * m.parallax) % (canvas.width * 5); if(mX < -m.width) mX += (canvas.width * 5);
                ctx.save(); ctx.translate(mX, 185); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(m.width*0.5, -m.height); ctx.lineTo(m.width, 0);
                ctx.fillStyle = worldTime === 'DAY' ? m.color : '#1e293b'; ctx.fill(); ctx.restore();
            });
            
            ctx.fillStyle = worldTime === 'DAY' ? 'white' : '#cbd5e1'; ctx.fillRect(0, 180, canvas.width, canvas.height - 180);
            
            worldShops.forEach(s => {
                let sx = s.x - worldX; ctx.save(); ctx.translate(sx, s.y);
                ctx.fillStyle = '#451a03'; ctx.fillRect(5, 40, 120, 70);
                ctx.fillStyle = '#7f1d1d'; ctx.beginPath(); ctx.moveTo(-15, 45); ctx.lineTo(65, -5); ctx.lineTo(145, 45); ctx.fill();
                ctx.fillStyle = '#fef3c7'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('SKI SHOP', 65, 15);
                ctx.restore();
            });

            worldCoins.forEach(c => {
                let cx = c.x - worldX; ctx.fillStyle = '#fbbf24'; ctx.beginPath(); ctx.arc(cx, c.y, c.size, 0, Math.PI*2); ctx.fill();
            });

            trees.forEach(t => {
                let tx = t.x - worldX; ctx.fillStyle = t.color; ctx.beginPath(); ctx.moveTo(tx, t.y-t.size); ctx.lineTo(tx-t.size*0.5, t.y); ctx.lineTo(tx+t.size*0.5, t.y); ctx.fill();
            });

            groundRocks.forEach(g => {
                let gx = g.x - worldX; g.rocks.forEach(r => {
                    ctx.save(); ctx.translate(gx, g.y); ctx.globalAlpha = r.dissolveAlpha; ctx.fillStyle = r.colors.mid;
                    ctx.beginPath(); ctx.moveTo(r.vertices[0].x, r.vertices[0].y);
                    for(let i=1; i<r.vertices.length; i++) ctx.lineTo(r.vertices[i].x, r.vertices[i].y);
                    ctx.closePath(); ctx.fill(); ctx.restore();
                });
            });
            
            floatingWords.forEach(w => {
                let wx = w.x-worldX; ctx.save(); ctx.translate(wx, w.y+Math.sin(w.pulse)*10); 
                ctx.fillStyle='white'; ctx.beginPath(); ctx.roundRect(-45,-18,90,36,12); ctx.fill();
                ctx.strokeStyle='#3b82f6'; ctx.stroke(); ctx.fillStyle='#1e3a8a'; ctx.font='bold 14px sans-serif'; ctx.textAlign='center'; ctx.fillText(w.en,0,5); 
                if (w.isFrozen) { ctx.fillStyle = 'rgba(186, 230, 253, 0.7)'; ctx.roundRect(-45,-18,90,36,12); ctx.fill(); }
                ctx.restore();
            });

            projectiles.forEach(p => { ctx.fillStyle='#fbbf24'; ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2); ctx.fill(); });

            if (finishLine.active) {
                let fx = finishLine.x - worldX; ctx.fillStyle = '#ef4444'; ctx.fillRect(fx, 180, 20, canvas.height);
                ctx.fillStyle = '#3b82f6'; ctx.fillRect(fx+450, 180, 20, canvas.height);
            }

            if (player.firingThaw) {
                ctx.save(); const b = ctx.createLinearGradient(player.screenX+20, player.screenY, player.screenX+400, player.screenY);
                b.addColorStop(0, 'rgba(168, 85, 247, 0.7)'); b.addColorStop(1, 'rgba(59, 130, 246, 0)');
                ctx.fillStyle = b; ctx.beginPath(); ctx.moveTo(player.screenX+20, player.screenY-5); ctx.lineTo(player.screenX+400, player.screenY-50); ctx.lineTo(player.screenX+400, player.screenY+50); ctx.lineTo(player.screenX+20, player.screenY+5); ctx.fill(); ctx.restore();
            }

            // 主角
            if (!(player.invincible && Math.floor(Date.now()/100)%2===0)) {
                ctx.save(); ctx.translate(player.screenX, player.screenY);
                const currentImg = player.vx < 0 ? playerImg02 : playerImg01;
                if (currentImg.complete && currentImg.naturalWidth !== 0) { ctx.drawImage(currentImg, -35, -35, 70, 70); } 
                else { ctx.fillStyle=player.isGodMode?'#f59e0b':'#ef4444'; ctx.beginPath(); ctx.roundRect(-15,-20,30,40,8); ctx.fill(); }
                ctx.restore();
            }

            if (avalanche.active) {
                ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fillRect(0, 0, avalanche.screenX, canvas.height);
                for(let y=0; y<canvas.height; y+=80) { ctx.beginPath(); ctx.arc(avalanche.screenX, y, 60, 0, Math.PI*2); ctx.fill(); }
            }
            clouds.forEach(c => { ctx.globalAlpha=0.15; ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(c.x, c.y, c.size, 0, Math.PI*2); ctx.fill(); });
        }

        let lastTime = performance.now();
        function gameLoop(time) { const dt = time - lastTime; lastTime = time; update(dt); draw(); requestAnimationFrame(gameLoop); }
        function startGame() { gameState = 'PLAYING'; startScreen.classList.add('hidden'); resetGameParams(); requestAnimationFrame(gameLoop); }
        window.resetGame = () => { resetGameParams(); gameState = 'PLAYING'; };
        window.startGame = startGame;
    </script>
</body>
